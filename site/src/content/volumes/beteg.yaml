description: "Két őszi-tavaszi mese, amelyben Bogyó fülgyulladással ágynak esik és barátai gondoskodnak róla, majd a társaság egy messziről érkezett kis dongólánynak segít otthonra találni. Betegségről, gondoskodásról és barátságról szóló történetek."
