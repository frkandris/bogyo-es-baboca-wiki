summary: "A kis rovarok buborékfújó-versenyt tartanak, és Kata, Babóca sárga hátú rokona fújja a legnagyobb buborékokat. Ugri irigységből kicsúfolja Katát, amiért nem piros a háta, mire a katicalány sírva fakad. Kelemen, a madár tanácsára Ugri belátja a hibáját, és bocsánatkérésül a saját buborékfújóját ajándékozza a katicalánynak. A két barát kibékül, és késő estig együtt ültetnek virágot."
