summary: "Ősszel Bogyó és Babóca tandembiciklivel indulnak a Százlábúhoz, hogy segítsenek leszedni a szőlőt, de útközben kipukkad a kerekük. Kalandos úton jutnak célba: előbb Soma, a sün gesztenyehintója, majd egy ugrabugráló béka, végül a hangyák színes kisvonata viszi tovább a társaságot. Több napig tartó közös munkával leszüretelik és kitapossák a szőlőt, este pedig énekelve, táncolva ünneplik a jó termést."
