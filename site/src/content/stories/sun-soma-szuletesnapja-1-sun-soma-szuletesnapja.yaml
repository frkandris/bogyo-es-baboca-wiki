summary: "Egy nyári napon a barátok rájönnek, hogy Sün Soma nemsokára tízéves lesz, ezért meglepetést készítenek neki. Ácsolnak egy nagy hajó alakú hintát, amely elbírja a sünit, és emeletes szülinapi tortát is sütnek. A tortát azonban felborítják a fogócskázó hangyagyerekek, ezért gyorsan hatalmas kupac gyümölcsöt gyűjtenek helyette, és abba tűzik a tíz gyertyát. Sün Soma boldogan ünnepel: kipróbálja az új hintát, mindenki jóllakik a gyümölcsből, este pedig a megmaradt almákat és körtéket a tüskéire tűzve tér haza."
