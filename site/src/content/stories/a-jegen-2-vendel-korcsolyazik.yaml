summary: "Bogyó és Babóca a befagyott tavon csúszkálnak, és Vendelt is hívják, de a szarvasbogár folyton elesik, sőt egy tüskés bokorba is belecsúszik, és már-már feladja. Ekkor megjelenik Milla, a hóbogár, aki a korcsolyájával könnyedén siklik a jégen. Milla fából korcsolyát készít mindannyiuknak, végül pedig Vendel is örömmel megtanul korcsolyázni."
