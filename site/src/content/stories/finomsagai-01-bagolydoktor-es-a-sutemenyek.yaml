summary: "Az erdő lakói sütőversenyt rendeznek, és a bölcs Bagolydoktort kérik fel zsűrinek. A doktor komolyan veszi a feladatot, ám kiderül, hogy néha még a legokosabbak is tévedhetnek. A kedves történet arról szól, hogy a hiba is az élet része, és mindenkinek másban rejlik a tehetsége."
