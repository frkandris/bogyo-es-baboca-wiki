summary: "Színes gyümölcsdarabokból összeállított nyársak, amelyeket a Szentjánosbogarakról neveztek el. A hasonló méretűre vágott gyümölcsöket nyársra fűzik, akár szín szerint rendezve. Üde, egészséges, sütés nélküli csemege."
