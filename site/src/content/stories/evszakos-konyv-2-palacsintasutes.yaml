summary: "Bogyó egyedül vág bele a palacsintasütésbe, de sorra elrontja: kimarad az olaj, a tészta a lámpán köt ki, a végén pedig csüggedten kijelenti, hogy soha többé nem süt. Babóca átjön hozzá, megvigasztalja, együtt rendet raknak és tömérdek palacsintát sütnek. Délután kiviszik a finomságokat a patakpartra, ahol a barátok fürödve, játszva, jóízűen falatozva ünneplik a nyarat."
