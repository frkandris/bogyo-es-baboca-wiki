summary: "Bogyó és Babóca papírsárkányt készítenek, majd elindulnak megröptetni. A sárkány sokáig nem száll fel, ám amikor hirtelen feltámad a szél, magával ragadja Babócát, és sorra a segítségére siető barátait is: Baltazárt, Dömét, Ugrit és Pihét. A csapat végül a fák tetején köt ki, ahonnan Vendel és Szellő egy kifeszített ponyva segítségével juttatja le a repülni nem tudó Bogyót. Estig önfeledten ugrálnak a ponyván, éjjel pedig a szél végleg elviszi a papírsárkányt."
