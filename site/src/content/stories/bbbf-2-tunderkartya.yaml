summary: "Pihe kedvenc tündéres memóriakártyáit Vendel biztatására Baltazár összefirkálja zöld filctollal. Amikor kiderül a csíny, a fiúk hiába próbálják kiradírozni a firkákat, csak kilyukasztják a lapokat. Babóca ötletére új kártyákat készítenek: ő lerajzolja a tündéreket, a fiúk pedig gondosan kiszínezik. A fiúk bocsánatot kérnek Pihétől, aki megbékél, és késő estig együtt kártyáznak az új paklival."
