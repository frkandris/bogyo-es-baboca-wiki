summary: "Egy nyári napon Bogyó és Babóca a barátaikkal a boszorkányokról beszélgetnek, és este visszatérnek a rétre, hátha látnak egyet. A sötétben ijesztő boszorkányok röppennek fel, akikről kiderül, hogy Pihe és Baltazár tréfálták meg őket. Bosszúból Bogyó és Babóca ördögjelmezbe bújva ijesztenek rá a barátaikra, ám ebből heves veszekedés lesz. Végül Babóca békíti ki a társaságot, együtt próbálják fel egymás jelmezeit, és seprűnyélen 'boszorkányként' repülnek."
