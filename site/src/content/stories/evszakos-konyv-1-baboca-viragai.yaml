summary: "Babóca izgatottan várja, hogy kibújjanak frissen ültetett tulipánjai, ám a fiúk barkácsolt gördeszkája megbokrosodik, és Baltazár végigszáguldva letarolja a katicalány kis kertjét. A barátok bűnbánóan törik a fejüket, majd Pihe ötletére éjszaka, a szentjánosbogarak fényénél átültetik Pihe tulipánjait Babóca háza elé. Reggel a katicalány boldogan fedezi fel az új virágokat, és épp megérkezik hozzá unokatestvére, Kata is."
