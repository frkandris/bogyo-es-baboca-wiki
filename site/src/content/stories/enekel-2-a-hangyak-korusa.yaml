summary: "Az erdő lakói úgy döntenek, hogy ünnepi koncerttel búcsúztatják az óévet, és Bagolydoktor lesz a karmester. Bogyó, Babóca és barátaik apró kacatokból saját hangszereket, csörgőket és csengőket készítenek. Milla hóbogár azonban a szánkóútján elveszíti a csengettyűkkel teli ládáját, ezért mindenki keresésre indul. Bagolydoktor végül a magasból veszi észre és szedi össze a hóban csillogó csengőket, így a hangyakórus és a szentjánosbogarak vidám énekszóval köszöntik az Új Évet."
