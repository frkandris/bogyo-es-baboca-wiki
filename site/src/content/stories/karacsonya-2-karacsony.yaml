summary: "Bogyó és Babóca fenyőágért indulnak az erdőbe, és egy vihar kidöntötte kis fa alatt egy megfázott, megsérült százlábúra bukkannak. Hazaviszik, meleg teával és mesével ápolják, majd amikor meggyógyul, marasztalják a karácsonyra. A barátok közösen készülnek az ünnepre: a hangyák új cipőcskéket varrnak a százlábúnak, a szentjánosbogarak pedig segítenek feldíszíteni a fát. Késő estig énekelnek, táncolnak és ajándékokat adnak egymásnak a karácsonyfa körül."
