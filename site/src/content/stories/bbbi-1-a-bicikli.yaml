summary: "Egy nyári napon a postagalamb nagy, piros csomagot hoz Bogyónak és Babócának a Százlábútól, aki hamarosan látogatóba érkezik. A két jó barát azon kezd civakodni, kié legyen az ajándék, végül duzzogva a réten hagyják a félig kicsomagolt biciklit. Baltazár és Pihe tolják oda nekik, ekkor derül ki, hogy tandembicikli, amin ketten is elférnek, így Bogyó és Babóca megbékél. Mivel a nagy veszekedésben elfelejtettek ajándékot készíteni, a négy jó barát színes szélforgót fabrikál virágszirmokból, és épp elkészülnek, mire a Százlábú egérfogaton megérkezik."
