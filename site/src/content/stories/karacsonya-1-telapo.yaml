summary: "Babóca izgatottan meséli Bogyónak, hogy éjjel jön a Télapó, ezért a csigafiú gondosan kifényesíti a csizmáját, és kiteszi az ablakba. Reggel az ő kis csizmája üresen marad, ezért elkeseredve világgá indul, és az erdőben egy fenyő alatt sírdogál. Barátai Babócával az élen megkeresik, és éppen ekkor tűnik fel az égen a Télapó rénszarvasszánja. Kiderül, hogy Bogyó ajándéka – egy színes szélcsengő – végig a másik ablakban várta, így a csigafiú megvigasztalódva, a csengő hangjára alszik el."
