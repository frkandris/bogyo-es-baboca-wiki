summary: "Karácsony napján Bogyó, Babóca és barátaik feldíszítik a Babóca háza előtti kis fenyőt, és karácsonyi dalokat énekelnek. Pihe titokban meghívja a régi ismerőst, a Csillaglányt, aki csillagházában száll alá az égből. A lányka csillagokból varázsol egy fényes csillaghajót, amellyel a kis barátok körberepülik a havas, alvó erdőt. Végül az utolsó csillag a fenyő csúcsára kerül, és mindannyian meghatottan éneklik tovább az ünnepi dalokat."
