summary: "Egy nyári napon az erdő lakói színes léghajóval indulnak kirándulni, és Babóca magával viszi kedvenc lila játéknyusziját. A magasban feltámad a szél, és kisodorja a nyuszit a katicalány kezéből. Az egész erdő összefog a keresésben: Bogyó, Baltazár, Sün Soma, a Hangyakirálynő, Bagolydoktor, a Szivárványhalak és sokan mások is kutatnak utána, de estére sem kerül elő. Bogyó, a legjobb barát, egész éjjel dolgozik, és egy új, szürke nyuszit varr Babócának. Másnap Baltazár mégis megtalálja az igazi lila nyuszit egy tölgyfa tetején, így a két jó barát végül elcseréli a két nyuszit, és nagy lakomával ünnepelnek."
