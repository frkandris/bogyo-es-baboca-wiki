summary: "Egy havas napon Bogyó, Babóca, Vendel és Baltazár hógolyózni indulnak, de Vendel és Baltazár összekapnak, mert Baltazár mindenben utánozza a szarvasbogarat. Egy legördülő óriási hógolyóból váratlanul Bagolydoktor bukkan elő, aki lecsúszott a hegyoldalon; ő békíti ki a két veszekedőt azzal, hogy mindenki a saját kedve szerinti hóembert építsen. A barátok vidáman sok hóembert emelnek a dombon, majd segítenek összeszedni a bagoly elvesztett fenyőtobozait, este pedig ki-ki otthon, boldogan alszik el."
